version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: archiving-db
    environment:
      POSTGRES_USER: archiving
      POSTGRES_PASSWORD: ${DB_PASSWORD:-archiving_secret}
      POSTGRES_DB: archiving_qa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archiving -d archiving_qa"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: archiving-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: archiving-backend
    environment:
      SERVER_PORT: "8080"
      SERVER_MODE: "release"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: archiving
      DB_PASSWORD: ${DB_PASSWORD:-archiving_secret}
      DB_NAME: archiving_qa
      DB_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-strong-random-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-strong-key}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY:-}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-http://ollama:11434}
      AI_MODEL: ${AI_MODEL:-llama3}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Background Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: archiving-worker
    environment:
      RUN_WORKER: "true"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: archiving
      DB_PASSWORD: ${DB_PASSWORD:-archiving_secret}
      DB_NAME: archiving_qa
      DB_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-http://ollama:11434}
      AI_MODEL: ${AI_MODEL:-llama3}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY:-}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Nuxt.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: archiving-frontend
    environment:
      API_BASE_URL: http://backend:8080/api/v1
      NUXT_PUBLIC_API_BASE: ${PUBLIC_API_BASE:-http://localhost:8080/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Ollama (Local AI - Optional)
  ollama:
    image: ollama/ollama:latest
    container_name: archiving-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    profiles:
      - ai

  # Meilisearch (Full-Text Search - Optional)
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: archiving-search
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey123}
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"
    restart: unless-stopped
    profiles:
      - search

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  meili_data:
